<!DOCTYPE html>
<html>
<body>
<script>
// Mock data
const ASSET_CLASSES = [
  { id: 'cash', baseReturn: 0.00, riskRange: 0.00 },
  { id: 'domestic_bond', baseReturn: 0.02, riskRange: 0.03 },
  { id: 'foreign_bond', baseReturn: 0.03, riskRange: 0.08 },
  { id: 'domestic_stock', baseReturn: 0.05, riskRange: 0.18 },
  { id: 'foreign_stock', baseReturn: 0.04, riskRange: 0.28 },
];

function generateEventSchedule(totalTurns) {
  const schedule = new Array(totalTurns + 1).fill(null);
  let crashCount = 0;
  for (let i = 1; i < totalTurns; i++) {
    const r = Math.random();
    if (r < 0.10 && crashCount < 2) {
      schedule[i] = 'CRASH';
      crashCount++;
    } else if (r < 0.25) {
      schedule[i] = 'BOOM';
    } else if (r < 0.40) {
      schedule[i] = 'INFLATION';
    }
  }
  return schedule;
}

function calculateMarketRates(event) {
  const rates = {};
  for (const asset of ASSET_CLASSES) {
    let rate = asset.baseReturn + (Math.random() * 2 - 1) * asset.riskRange;
    if (event === 'CRASH') {
      if (asset.id === 'domestic_stock') rate = -0.20 - Math.random() * 0.20;
      else if (asset.id === 'foreign_stock') rate = -0.40 - Math.random() * 0.20;
      else if (asset.id === 'domestic_bond') rate = 0.05 + Math.random() * 0.10;
      else if (asset.id === 'foreign_bond') rate = -0.05 - Math.random() * 0.10;
    } else if (event === 'INFLATION') {
      if (asset.id === 'cash') rate -= 0.05;
      else if (asset.id === 'domestic_stock') rate += 0.05;
      else if (asset.id === 'foreign_stock') rate += 0.08;
    } else if (event === 'BOOM') {
      if (asset.id === 'domestic_stock') rate += 0.10;
      else if (asset.id === 'foreign_stock') rate += 0.15;
    }
    rates[asset.id] = rate;
  }
  return rates;
}

let playerWins = 0;
const SIM_COUNT = 1000;

for (let s = 0; s < SIM_COUNT; s++) {
  let playerCoins = 1000;
  let kenCoins = 1000;
  let rowCoins = 1000;
  
  const schedule = generateEventSchedule(20);
  
  let rowPanicked = false;
  
  for (let turn = 1; turn <= 20; turn++) {
    const event = schedule[turn];
    const rates = calculateMarketRates(event);
    
    // Player (20% each)
    let p_new = 0;
    for (const a of ASSET_CLASSES) {
      p_new += (playerCoins * 0.2) * (1 + rates[a.id]);
    }
    playerCoins = p_new;
    
    // Ken (100% foreign_stock)
    kenCoins = kenCoins * (1 + rates.foreign_stock);
    
    // Row (Panic)
    if (rowPanicked) {
      rowCoins = rowCoins * (1 + rates.cash);
      rowPanicked = false;
    } else {
      let r_cash = rowCoins * 0.45;
      let r_dbond = rowCoins * 0.33;
      let r_dstock = rowCoins * 0.22;
      rowCoins = r_cash * (1 + rates.cash) + r_dbond * (1 + rates.domestic_bond) + r_dstock * (1 + rates.domestic_stock);
    }
    if (event === 'CRASH') rowPanicked = true;
  }
  
  if (playerCoins >= kenCoins && playerCoins >= rowCoins) {
    playerWins++;
  }
}

document.body.innerHTML = `<h1>Win Rate: ${((playerWins / SIM_COUNT) * 100).toFixed(2)}%</h1>`;
</script>
</body>
</html>
